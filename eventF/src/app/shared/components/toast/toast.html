@if (message()) {
  <aside
    class="toast"
    [class.success]="tone() === 'success'"
    [class.error]="tone() === 'error'"
    role="status"
    aria-live="polite"
  >
    <span>{{ message() }}</span>
    <button type="button" aria-label="Bildirimi kapat" (click)="dismiss()">Kapat</button>
  </aside>
}
