<main class="student-page">
  <header class="feed-header">
    <div class="brand">
      <span class="brand-mark">U</span>
      <span>UniEvents</span>
    </div>

    <nav class="student-nav" aria-label="Öğrenci menüsü">
      <app-ui-button variant="primary">Akış</app-ui-button>
      <app-ui-button (click)="openRegistrations()">Kayıtlarım</app-ui-button>
      <app-ui-button (click)="logout()">Çıkış Yap</app-ui-button>
    </nav>

    <div class="feed-tools">
      <app-search-bar
        [value]="searchQuery()"
        (valueChange)="updateSearchQuery($event)"
      />

      <app-category-chips
        [categories]="categories()"
        [selectedCategory]="selectedCategory()"
        (categoryChange)="updateCategory($event)"
      />
    </div>
  </header>

  @if (isLoading()) {
    <app-ui-state class="state-screen">Etkinlikler yükleniyor...</app-ui-state>
  } @else if (errorMessage()) {
    <app-ui-state class="state-screen" tone="error">{{ errorMessage() }}</app-ui-state>
  } @else if (filteredEvents().length === 0) {
    <app-ui-state class="state-screen">Etkinlik bulunamadı.</app-ui-state>
  } @else {
    <section class="event-feed" aria-label="Etkinlik akışı">
      @for (event of filteredEvents(); track event.id) {
        <section class="feed-slide">
          <app-event-card
            [event]="event"
            (registerClick)="registerToEvent($event)"
            (detailClick)="openEventDetail($event)"
          />
        </section>
      }
    </section>
  }
</main>
