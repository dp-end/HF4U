<div class="page-container">

  <h1 class="page-title">
    Upcoming Events
  </h1>

  <div class="events-container">

    @if (events().length === 0) {

      <p>No events available.</p>

    } @else {

      @for (event of events(); track event.id) {

        <div class="event-card">

          <h2>{{ event.title }}</h2>

          <p>{{ event.description }}</p>

          <p>📍 {{ event.location }}</p>

          <p>📅 {{ event.eventDate }}</p>

          <p>👥 {{ event.capacity }}</p>

        </div>

      }

    }

  </div>

</div>
