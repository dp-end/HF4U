<main class="auth-page">
  <section class="brand">
    <div class="brand-icon">&#9734;</div>
    <span>UniEvents</span>
  </section>

  <form class="auth-card" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <header class="auth-header">
      <h1>Hesap Oluştur</h1>
      <p>Zaten kayıtlı mısın? <button type="button" (click)="goToLogin()">Giriş Yap</button></p>
    </header>

    <label class="field">
      <input type="text" placeholder="Ad soyad" formControlName="fullName" />
    </label>

    <label class="field">
      <input type="email" placeholder="Üniversite e-postası" formControlName="email" />
    </label>

    <label class="field">
      <input type="password" placeholder="Şifre" formControlName="password" />
    </label>

    <div class="role-tabs" aria-label="Rol seçimi">
      <button
        type="button"
        [class.active]="selectedRole() === 'STUDENT'"
        (click)="selectRole('STUDENT')"
      >
        Öğrenci
      </button>

      <button
        type="button"
        [class.active]="selectedRole() === 'CLUB_MANAGER'"
        (click)="selectRole('CLUB_MANAGER')"
      >
        Kulüp Yöneticisi
      </button>
    </div>

    @if (errorMessage()) {
      <p class="error-message">{{ errorMessage() }}</p>
    }

    <button class="primary-button" type="submit" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        Oluşturuluyor...
      } @else {
        Hesap Oluştur <span aria-hidden="true">&rarr;</span>
      }
    </button>

    <p class="legal">
      Kayıt olarak <a href="#">Kullanım Şartları</a> ve <a href="#">Gizlilik Politikası</a> metinlerini kabul etmiş olursun.
    </p>
  </form>

  <button class="guest-link" type="button" (click)="browseAsGuest()">
    &larr; Giriş yapmadan etkinlikleri keşfet
  </button>
</main>
