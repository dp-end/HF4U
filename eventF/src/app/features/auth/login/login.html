<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

  <div>
    <label>Email</label>
    <input type="email" formControlName = "email">
  </div>

  <br>

  <div>
    <label>Password</label>
    <input type="password" formControlName="password">
  </div>

  <br>
  <button type="submit">
    Login
  </button>

</form>
